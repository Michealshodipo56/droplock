<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DropLock - Account Recovery</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="recovery-page">
  <canvas id="bg-canvas"></canvas>

  <div class="layout-wrapper" style="justify-content: center; align-items: center;">
    <div class="vault-card" style="max-width: 500px; text-align: center;">
      <h1 class="vault-title" style="font-size: 2.5rem;">RECOVERY_PROTOCOL</h1>
      <p style="color: var(--text-dim); margin-bottom: 32px; line-height: 1.6;">Please enter your locker recovery questions to regain access to your vault.</p>
      
      <div class="input-group">
        <label class="input-label">RECOVERY QUESTION 1</label>
        <input type="text" class="terminal-input" placeholder="ANSWER...">
      </div>

      <a href="index.html" class="btn-access" style="display: inline-block; text-decoration: none; margin-top: 24px;">BACK TO VAULT</a>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
